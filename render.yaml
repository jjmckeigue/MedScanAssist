services:
  - type: web
    name: medscanassist-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: REQUIRE_CHECKPOINT
        value: "false"
      - key: CORS_ORIGINS
        value: "https://med-scan-assist.vercel.app,https://medscanassist.com"
    healthCheckPath: /health
