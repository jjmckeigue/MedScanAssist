services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: medscanassist-backend
    env_file:
      - .env
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
